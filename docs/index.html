<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Video to Obsidian Demo</title>
<style>
body{font-family:system-ui;max-width:820px;margin:24px auto;padding:0 16px}
input,button{padding:10px;font-size:16px}
.result{margin-top:24px;padding:16px;border:1px solid #e5e7eb;border-radius:10px;background:#f8fafc}
</style>
</head>
<body>
<h1>Video to Obsidian Demo</h1>
<p>提交视频链接，GitHub Actions 将生成 MP4、MP3、原始/优化文案和 Markdown。</p>
<input id="url" placeholder="https://www.youtube.com/watch?v=..." style="width:100%">
<button id="run">提交</button>
<div class="result" id="out" style="display:none"></div>
<script>
document.getElementById('run').addEventListener('click',async()=>{
  const url=document.getElementById('url').value.trim();
  if(!url){alert('请输入视频链接');return}
  const out=document.getElementById('out');
  out.style.display='block';
  out.innerHTML='准备跳转到 GitHub Actions...';
  try{
    await navigator.clipboard.writeText(url);
    const actionsUrl='https://github.com/sendohza/video-to-obsidian-demo/actions/workflows/video2md.yml';
    window.open(actionsUrl,'_blank');
    out.innerHTML='链接已复制，请在打开的 GitHub Actions 页面中点击 <b>Run workflow</b>，粘贴链接后运行。完成后可在 <a href="https://github.com/sendohza/video-to-obsidian-demo/tree/main/docs/results" target="_blank">docs/results/</a> 查看结果。';
  }catch(e){out.innerHTML='操作失败：'+e.message}
});
</script>
</body>
</html>
